<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/geofire-common@5.2.0/dist/geofire-common/geofire-common.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="map.css">
</head>

<body>
  <section id="explainer">
    <h3>Here's our view from the ground:</h3>
    <div class="stats-toggle-container">
      <input type="checkbox" id="stats-toggle">
      <label for="stats-toggle">Show counts</label>
    </div>
  </section>
  <a class="map-fab" href="./index.html" aria-label="Record a new spot" title="Record a new spot">+</a>
  <button class="search-fab" id="search-fab" aria-label="Search location" title="Search location">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>

  <div id="search-modal" class="search-modal" aria-hidden="true">
    <div class="search-modal-inner">
      <div class="search-modal-header">
        <span class="search-modal-title">Search location</span>
        <button class="search-dismiss" id="search-dismiss" aria-label="Close search">&#x2715;</button>
      </div>
      <div class="search-input-row">
        <input type="text" id="search-input" class="search-input" placeholder="Enter a city, neighbourhood…" autocomplete="off" />
        <button class="search-go" id="search-go" aria-label="Go">Go</button>
      </div>
      <div id="search-error" class="search-error" aria-live="polite"></div>
      <div class="search-quick-links">
        <button class="search-quick-btn" data-lat="49.2827" data-lng="-123.1207" data-zoom="12">Vancouver</button>
        <button class="search-quick-btn" data-lat="43.6532" data-lng="-79.3832" data-zoom="12">Toronto</button>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <script src="./js/firebase-config.js"></script>
  <script src="./js/map.js"></script>
  <script src="./js/search.js"></script>

</body>

</html>
