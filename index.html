<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/ui/6.1.0/firebase-ui-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
  <script src="https://unpkg.com/geofire-common@5.2.0/dist/geofire-common/geofire-common.min.js"></script>
  <link type="text/css" rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/6.1.0/firebase-ui-auth.css" />
  <title>Rating App</title>
</head>

<body>
  <h1>urbanist views from the ground</h1>

  <div id="loader">Signing in...</div>
  <div id="firebaseui-auth-container"></div>

  <div id="main-wrapper" style="display: none;">
    <div id="rating-rows">
      <div class="rating-group">
        <h4>Mobility & Transit</h4>
        <div class="rating-row">
          <h3>Transit connectivity</h3>
          <button class="thumbs-down">🚗</button>
          <button class="thumbs-up">🚊</button>
          <button class="toggle" data-key="Transit Stop Quality">🚏</button>
        </div>
        <div class="rating-row">
          <h3>Bike infrastructure</h3>
          <button class="thumbs-down">🚳</button>
          <button class="thumbs-up">🚲</button>
          <button class="toggle" data-key="kid_friendlyBike infrastructure">👶</button>
        </div>
      </div>

      <div class="rating-group">
        <h4>Street & Environment</h4>
        <div class="rating-row">
          <h3>Road Safety Vibes</h3>
          <button class="thumbs-down">🚙</button>
          <button class="thumbs-up">😌</button>
          <button class="toggle" data-key="kid_friendlyRoad Safety Vibes">👶</button>
          <button class="toggle" data-key="Traffic Calming">🍌</button>
          <button class="toggle" data-key="Sidewalk Quality">🚶</button>
        </div>
        <div class="rating-row neighbourhood-care">
          <h3>Neighbourhood Care</h3>
          <button class="toggle" data-key="loved">💕</button>
          <button class="toggle" data-key="clean">🗑️</button>
          <button class="toggle" data-key="activism_and_organizing">📣</button>
          <button class="toggle" data-key="supportive_signs">🪧</button>
          <button class="toggle" data-key="greenery">🌱</button>
        </div>
      </div>

      <div class="rating-group">
        <h4>Area Character</h4>
        <div class="rating-row">
          <h3>Density</h3>
          <button class="thumbs-down">🏡</button>
          <button class="thumbs-up">🏙️</button>
        </div>
        <div class="rating-row">
          <h3>Liveliness</h3>
          <button class="thumbs-down">😴</button>
          <button class="thumbs-up">👯</button>
        </div>
      </div>

      <div class="freeform-text">
        <label for="freeform-input">Additional tags:</label>
        <input type="text" id="freeform-input" placeholder="Enter your tags here">
      </div>
    </div>
  </div>

  <div id="actions">
    <button id="submit-button" class="modern-button" style="display: none;">Submit this place</button>
    <a class="modern-button" href="./map.html">See the shared map</a>
    <button id="sign-out" class="modern-button" style="display: none;">Sign Out</button>
  </div>
  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="./js/firebase-config.js"></script>
  <script src="./js/index.js"></script>
</body>

</html>
